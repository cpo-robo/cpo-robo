<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPO Robo - Centralized Permitting Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --accent-cyan: #00d9ff;
            --accent-blue: #0066ff;
            --accent-purple: #d946ff;
            --text-primary: #e0e6ff;
            --text-secondary: #a0aad0;
            --border-color: rgba(0, 217, 255, 0.2);
            --glow-color: rgba(0, 217, 255, 0.4);
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 217, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(217, 70, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        header {
            position: relative;
            z-index: 10;
            padding: 20px 30px;
            border-bottom: 2px solid var(--border-color);
            backdrop-filter: blur(10px);
            background: rgba(10, 14, 39, 0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--glow-color);
            font-family: 'Space Mono', monospace;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px var(--glow-color); }
            50% { text-shadow: 0 0 20px var(--glow-color), 0 0 30px rgba(0, 217, 255, 0.3); }
        }

        .system-status {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 6px var(--accent-cyan);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 5;
            gap: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(0, 217, 255, 0.05);
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        .message {
            display: flex;
            gap: 15px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.2), rgba(0, 217, 255, 0.15));
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.1);
        }

        .message.ai .message-bubble {
            background: rgba(26, 31, 58, 0.8);
            border-color: rgba(217, 70, 255, 0.3);
            box-shadow: 0 0 15px rgba(217, 70, 255, 0.05);
        }

        .message-label {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .loading {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 15px 20px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-10px); }
        }

        .input-area {
            padding: 20px 30px 30px;
            border-top: 2px solid var(--border-color);
            backdrop-filter: blur(10px);
            background: rgba(10, 14, 39, 0.7);
            position: relative;
            z-index: 10;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: rgba(26, 31, 58, 0.6);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            transition: all 0.3s ease;
        }

        /* Remove spinner arrows from number input */
        .input-field::-webkit-outer-spin-button,
        .input-field::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .input-field[type=number] {
            -moz-appearance: textfield;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(26, 31, 58, 0.9);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .send-button {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border: 2px solid var(--accent-cyan);
            border-radius: 6px;
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            text-transform: uppercase;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 217, 255, 0.5);
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            gap: 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.6;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state-title {
            font-size: 24px;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            font-family: 'Space Mono', monospace;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 13px;
            max-width: 300px;
            line-height: 1.6;
        }

        .suggestions-container {
            margin-top: 30px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        .suggestions-label {
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            max-width: 600px;
        }

        .suggestion-btn {
            padding: 12px 16px;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 6px;
            color: var(--accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            line-height: 1.4;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.1);
        }

        .suggestion-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
            transform: translateY(-2px);
        }

        .suggestion-btn:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
            }

            header {
                padding: 15px 20px;
            }

            .messages-container {
                padding: 20px;
            }

            .input-area {
                padding: 15px 20px 20px;
            }

            .logo {
                font-size: 20px;
            }

            .suggestions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">CPO ROBO</div>
            <div style="font-size: 12px; color: var(--text-secondary);">
                Centralized Permitting Bot v1.0
            </div>
        </div>
        <div class="system-status">
            <span>SYSTEM STATUS</span>
            <div class="status-indicator"></div>
            <span>ONLINE</span>
        </div>
    </header>

    <div class="container">
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-state-icon">⬢</div>
                <div class="empty-state-title">CPO ROBO INITIALIZED</div>
                <div class="empty-state-text">
                    Centralized Permitting Bot
                    <br><br>
                    Ask me anything about Syracuse permits
                </div>
                <div class="suggestions-container">
                    <div class="suggestions-label">Try asking about:</div>
                    <div class="suggestions-grid">
                        <button class="suggestion-btn" onclick="useSuggestion('What documents do I need for a new build permit?')">📋 Required Documents</button>
                        <button class="suggestion-btn" onclick="useSuggestion('What are the insurance requirements for residential permits?')">🛡️ Insurance Requirements</button>
                        <button class="suggestion-btn" onclick="useSuggestion('How long does the permit approval process take?')">⏱️ Timeline & Approval</button>
                        <button class="suggestion-btn" onclick="useSuggestion('Who do I contact for permit inspections?')">👷 Inspections & Contacts</button>
                        <button class="suggestion-btn" onclick="useSuggestion('What are the zoning restrictions for my area?')">📍 Zoning & Location</button>
                        <button class="suggestion-btn" onclick="useSuggestion('What is the permit application fee?')">💰 Costs & Fees</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                class="input-field"
                id="inputField"
                placeholder="Ask about permits, requirements, documents..."
                rows="1"
            ></textarea>
            <button class="send-button" id="sendButton">SEND</button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const inputField = document.getElementById('inputField');
        const sendButton = document.getElementById('sendButton');

        // OpenAI Configuration
        const OPENAI_API_KEY = prompt('Enter your OpenAI API key:');
        let permitGuideContext = '';

        // Load permit guide on startup
        async function loadPermitGuide() {
            try {
                const response = await fetch('Syracuse_Permit_Guide_RAG.json');
                const data = await response.json();
                permitGuideContext = "## Syracuse Residential Permit Guide\n\n";
                for (const chunk of data.chunks || []) {
                    permitGuideContext += `### ${chunk.title}\n${chunk.content}\n\n`;
                }
            } catch (error) {
                console.warn('Could not load permit guide:', error);
            }
        }

        // Initialize on load
        loadPermitGuide();

        // Auto-resize textarea
        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
        });

        // Send message on Enter (Ctrl+Enter on mobile)
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message || !OPENAI_API_KEY) {
                if (!OPENAI_API_KEY) {
                    addMessage('Error: API key not provided. Please refresh and enter your OpenAI API key.', 'ai');
                }
                return;
            }

            // Clear input
            inputField.value = '';
            inputField.style.height = 'auto';

            // Add user message
            addMessage(message, 'user');

            // Show loading
            addLoadingMessage();

            try {
                // Build system prompt with permit guide
                const systemPrompt = `You are CPO Robo, a Centralized Permitting Bot for the City of Syracuse.
You help residents understand the permit process for new residential builds and modular homes.

You have access to the City of Syracuse Residential Permit Guide. Use this information to answer questions accurately.
Be helpful, clear, and professional. If you don't know something, say so honestly.
Provide specific contact information and links when relevant.

## Reference Materials:
${permitGuideContext}`;

                // Call OpenAI API directly
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        max_tokens: 1024,
                        system: systemPrompt,
                        messages: [
                            { role: 'user', content: message }
                        ]
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Failed to get response');
                }

                const data = await response.json();

                // Remove loading message
                removeLoadingMessage();

                // Add AI response
                const responseText = data.choices[0]?.message?.content || 'No response received';
                addMessage(responseText, 'ai');
            } catch (error) {
                removeLoadingMessage();
                addMessage(`Error: ${error.message}. Please check your API key and internet connection.`, 'ai');
                console.error('Error:', error);
            }

            // Focus input
            inputField.focus();
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const labelDiv = document.createElement('div');
            labelDiv.className = 'message-label';
            labelDiv.textContent = sender === 'user' ? 'YOU' : 'CPO ROBO';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;

            messageDiv.appendChild(labelDiv);
            messageDiv.appendChild(bubbleDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'loadingMessage';

            const labelDiv = document.createElement('div');
            labelDiv.className = 'message-label';
            labelDiv.textContent = 'CPO ROBO';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

            messageDiv.appendChild(labelDiv);
            messageDiv.appendChild(loadingDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        // Handle suggestion button clicks
        function useSuggestion(text) {
            inputField.value = text;
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
            inputField.focus();
            // Auto-send after a short delay
            setTimeout(() => {
                sendMessage();
            }, 100);
        }

        // Focus input on load
        inputField.focus();
    </script>
</body>
</html>
